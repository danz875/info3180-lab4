{% extends "base.html" %}

{% block main %}
<h1>File Upload</h1>

<form method="POST" enctype="multipart/form-data">
    {{ form.csrf_token }}

    <div class="mb-3">
        {{ form.photo.label(class="form-label") }}
        {{ form.photo(class="form-control") }}
    </div>

    <div class="mb-3">
        {{ form.submit(class="btn btn-primary") }}
    </div>
</form>
{% endblock %}
